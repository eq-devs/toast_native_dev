name: toast_native_dev
description: Native toast notifications that appear above Flutter widgets and native WebViews using platform overlays (Android WindowManager + iOS UIWindow).
version: 0.0.2
homepage: https://github.com/eq-devs/toast_native_dev
repository: https://github.com/eq-devs/toast_native_dev
issue_tracker: https://github.com/eq-devs/toast_native_dev/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: dev.eqdevs.toast_native_dev
        pluginClass: NativeToastPlugin
      ios:
        pluginClass: NativeToastPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
