name: toast_native_dev
description: Native toast notifications that appear above Flutter widgets and native WebViews using platform overlays.
version: 0.0.1
homepage: https://github.com/yourorg/toast_native_dev

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.example.native_toast
        pluginClass: NativeToastPlugin
      ios:
        pluginClass: NativeToastPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
